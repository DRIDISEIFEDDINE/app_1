<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Intervention MS - Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
</head>

<body>

<div class="container">

    <div class="left">

    <!-- HEADER FIXE EN HAUT -->
    <div class="header-top">
        <img src="{{ url_for('static', filename='images/Logo Authentification.png') }}" class="logo">
        <span class="title">Intervention MS</span>
    </div>

    <!-- CONTENU CENTRÉ -->
    <div class="login-box">
        <h2>Connectez-vous</h2>

        <form method="POST">
            <label>Email ou identifiant *</label>
<input type="text" name="email" autocomplete="username" required>

<label>Mot de passe *</label>
<div class="password-wrapper">
    <input type="password" name="password" autocomplete="current-password" required>
    <span class="toggle-password" onclick="togglePassword(this)">👁</span>
</div>

            <button type="submit">Se connecter</button>
        </form>

        <div class="links">
            <a href="{{ url_for('auth.change_password') }}">Changer le mot de passe</a>
            <span>|</span>
            <a href="{{ url_for('auth.forgot_password') }}">Mot de passe oublié</a>
        </div>
    </div>

</div>

    <!-- RIGHT -->
<div class="right">
    <img src="{{ url_for('static', filename='images/Fond Authentification.png') }}">

    <!-- TEXTE MILIEU -->
    <div class="right-center-text">
        La vie change avec <span class="orange">Orange</span>
    </div>

    <!-- TEXTE BAS -->
    <div class="right-bottom-text">
        <div class="title-bottom">
            La plateforme de l’intervention<br>
            <span>Multiservices</span>
        </div>

        <div class="features">
            ✓ Suivi Back Log<br>
            ✓ Suivi KPI<br>
            ✓ MAJ Rapide
        </div>
    </div>
</div>

</div>
<script>
function togglePassword(el) {
    const input = el.previousElementSibling;

    if (input.type === "password") {
        input.type = "text";
        el.textContent = "👁‍🗨";
    } else {
        input.type = "password";
        el.textContent = "👁";
    }
}
</script>
</body>
</html>
